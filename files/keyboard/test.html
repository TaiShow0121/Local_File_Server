<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Canvasバーチャルキーボード（日本語＋漢字予測＋英数）</title>
  <style>
    body { font-family: sans-serif; padding: 30px; background: #f5f5f5; }
    #keyboard { display: grid; grid-template-columns: repeat(10, 50px); gap: 8px; margin-top: 20px; }
    .key { background:#fff; border:2px solid #ccc; padding:12px; text-align:center; border-radius:6px; cursor:pointer; user-select:none; transition:0.1s; }
    .key:hover { background:#ddd; }
    .wide { grid-column: span 2; }
    #canvasOutput { background:#fff; border:2px solid #aaa; margin-top:20px; }
    #suggestions { margin-top:8px; display:flex; gap:6px; flex-wrap:wrap; }
    .candidate { background:#fff; border:1px solid #aaa; border-radius:4px; padding:2px 6px; cursor:pointer; font-size:14px; }
    .candidate:hover { background:#e0e0e0; }
  </style>
</head>
<body>
  <h1>🖋️ Canvasバーチャルキーボード</h1>
  <canvas id="canvasOutput" width="800" height="60"></canvas>
  <div id="suggestions"></div>

  <!-- キーボード -->
  <div id="keyboard">
    <!-- 1st row -->
    <div class="key">Q</div><div class="key">W</div><div class="key">E</div><div class="key">R</div><div class="key">T</div>
    <div class="key">Y</div><div class="key">U</div><div class="key">I</div><div class="key">O</div><div class="key">P</div>
    <!-- 2nd row -->
    <div class="key">A</div><div class="key">S</div><div class="key">D</div><div class="key">F</div><div class="key">G</div>
    <div class="key">H</div><div class="key">J</div><div class="key">K</div><div class="key">L</div><div class="key wide">Back</div>
    <!-- 3rd row -->
    <div class="key">Z</div><div class="key">X</div><div class="key">C</div><div class="key">V</div><div class="key">B</div>
    <div class="key">N</div><div class="key">M</div><div class="key wide">Space</div><div class="key wide">Clear</div>
    <!-- 4th row -->
    <div class="key wide">Eng</div><div class="key wide">Enter</div>
  </div>

<script>
const keys          = document.querySelectorAll('.key');
const canvas        = document.getElementById('canvasOutput');
const ctx           = canvas.getContext('2d');
const suggestionsEl = document.getElementById('suggestions');

let romaji  = ""; // 未確定ローマ字
let content = ""; // 確定テキスト
let phrase  = ""; // 直近のかなフレーズ

/**
 * --- 1. ローマ字 → ひらがな マッピング ---
 *  必要に応じて拡張
 */
const romajiMap = {
  a:"あ",i:"い",u:"う",e:"え",o:"お", ka:"か",ki:"き",ku:"く",ke:"け",ko:"こ",
  sa:"さ",shi:"し",su:"す",se:"せ",so:"そ", ta:"た",chi:"ち",tsu:"つ",te:"て",to:"と",
  na:"な",ni:"に",nu:"ぬ",ne:"ね",no:"の", ha:"は",hi:"ひ",fu:"ふ",he:"へ",ho:"ほ",
  ma:"ま",mi:"み",mu:"む",me:"め",mo:"も", ya:"や",yu:"ゆ",yo:"よ", ra:"ら",ri:"り",ru:"る",re:"れ",ro:"ろ",
  wa:"わ",wo:"を",nn:"ん",
  ga:"が",gi:"ぎ",gu:"ぐ",ge:"げ",go:"ご", za:"ざ",ji:"じ",zu:"ず",ze:"ぜ",zo:"ぞ",
  da:"だ",di:"ぢ",du:"づ",de:"で",do:"ど", ba:"ば",bi:"び",bu:"ぶ",be:"べ",bo:"ぼ", pa:"ぱ",pi:"ぴ",pu:"ぷ",pe:"ぺ",po:"ぽ",
  kya:"きゃ",kyu:"きゅ",kyo:"きょ", sha:"しゃ",shu:"しゅ",sho:"しょ", cha:"ちゃ",chu:"ちゅ",cho:"ちょ",
  nya:"にゃ",nyu:"にゅ",nyo:"にょ", gya:"ぎゃ",gyu:"ぎゅ",gyo:"ぎょ", ja:"じゃ",ju:"じゅ",jo:"じょ",
  fa:"ふぁ",fi:"ふぃ",fe:"ふぇ",fo:"ふぉ", qa:"くぁ",xi:"ぃ",xtsu:"っ",xya:"ゃ",xyu:"ゅ",xyo:"ょ"
};

/**
 * --- 2. かな → 漢字/カタカナ 変換辞書 ---
 *  大きな辞書を手で書くのは大変なので、外部の JSON をロードします。
 *  ここでは demo/kanaDict.json（同じサーバーに置いた例）をフェッチ。
 *  実運用ではサーバー API / オープンデータを使って OK。
 */
let kanaDict = {};
fetch('kanaDict.json')
  .then(res => res.json())
  .then(json => { kanaDict = json; })
  .catch(() => {
    // フォールバック（最低限）
    kanaDict = { "かんじ":["漢字","感じ"], "まじ":["マジ"], "くさ":["草"] };
  });

/** 3. テキスト描画 */
function renderText(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.font="24px sans-serif";
  ctx.fillStyle="#000";
  ctx.fillText(content,10,40);
  if(romaji){ const w=ctx.measureText(content).width; ctx.fillStyle="#888"; ctx.fillText(romaji,10+w,40);} }

/** 4. 予測候補描画 */
function renderSuggestions(list){
  suggestionsEl.innerHTML="";
  list.forEach(txt=>{
    const span=document.createElement('span'); span.textContent=txt; span.className='candidate';
    span.onclick=()=>{ content+=txt; phrase=""; romaji=""; renderText(); renderSuggestions([]); };
    suggestionsEl.appendChild(span);
  });
}

/** 5. ローマ字変換 → ひらがな確定 */
function tryConvertRomaji(){
  for(let len=5; len>0; len--){ const part=romaji.slice(-len); if(romajiMap[part]){ const kana=romajiMap[part]; content+=kana; phrase+=kana; romaji=romaji.slice(0,-len); return true; }} return false; }

/** 6. 候補更新 */
function updateKanaPrediction(){
  if(!romaji){ const list=kanaDict[phrase]||[]; renderSuggestions(list); }
  else {
    const set=new Set(); for(const [key,val] of Object.entries(romajiMap)){ if(key.startsWith(romaji)&&key!==romaji) set.add(val);} renderSuggestions([...set].slice(0,8));
  }
}

function commitRomajiAsAscii(){ if(romaji){ content+=romaji; romaji=""; } }

function handleKey(keyVal){
  switch(keyVal){
    case 'back': if(romaji) romaji=romaji.slice(0,-1); else {content=content.slice(0,-1); phrase=phrase.slice(0,-1);} break;
    case 'clear': romaji=""; content=""; phrase=""; break;
    case 'space': tryConvertRomaji(); commitRomajiAsAscii(); content+=" "; phrase=""; break;
    case 'enter': tryConvertRomaji(); commitRomajiAsAscii(); phrase=""; break;
    case 'eng': commitRomajiAsAscii(); break;
    default: romaji+=keyVal; tryConvertRomaji(); }
  renderText(); updateKanaPrediction(); }

keys.forEach(k=>k.addEventListener('click',()=>handleKey(k.textContent.toLowerCase())));

renderText();
</script>
</body>
</html>
