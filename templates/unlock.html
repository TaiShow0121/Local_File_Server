<!DOCTYPE html>
<html lang="ja" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ app_settings.workspace_name }} - 共有キー</title>
  <style>
    :root {
      --bg: #eef3f6;
      --card: #ffffff;
      --text: #17202a;
      --muted: #64748b;
      --border: #dbe4ea;
      --brand: #155e75;
      --brand-2: #0f766e;
      --danger: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      color: var(--text);
      background:
        radial-gradient(circle at 15% 10%, rgba(21, 94, 117, .12), transparent 28rem),
        var(--bg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .unlock-card {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .14);
      overflow: hidden;
    }
    .unlock-head {
      display: flex;
      gap: 12px;
      align-items: center;
      padding: 20px 22px 16px;
      border-bottom: 1px solid var(--border);
    }
    .logo {
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      color: #fff;
      border-radius: 11px;
      background: linear-gradient(135deg, var(--brand), var(--brand-2));
      font-size: 20px;
      flex: 0 0 auto;
    }
    h1 {
      margin: 0;
      font-size: 18px;
      line-height: 1.25;
    }
    .sub {
      margin-top: 3px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 600;
    }
    form {
      display: grid;
      gap: 12px;
      padding: 20px 22px 22px;
    }
    label {
      display: grid;
      gap: 7px;
      font-size: 13px;
      font-weight: 700;
    }
    input {
      width: 100%;
      min-height: 44px;
      border: 1px solid var(--border);
      border-radius: 9px;
      padding: 0 12px;
      color: var(--text);
      font: inherit;
      outline: none;
    }
    input:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(21, 94, 117, .14);
    }
    button {
      min-height: 44px;
      border: 0;
      border-radius: 9px;
      color: #fff;
      background: linear-gradient(135deg, var(--brand), var(--brand-2));
      font: inherit;
      font-weight: 800;
      cursor: pointer;
    }
    .hint {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.6;
    }
    .error {
      display: none;
      color: var(--danger);
      font-size: 13px;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main class="unlock-card">
    <div class="unlock-head">
      <div class="logo">&#128274;</div>
      <div>
        <h1>{{ app_settings.workspace_name }}</h1>
        <div class="sub">共有キーを入力してください</div>
      </div>
    </div>
    <form id="unlock-form">
      <label>
        共有キー
        <input id="share-key" type="password" autocomplete="current-password" autofocus>
      </label>
      <div class="error" id="unlock-error"></div>
      <button type="submit">開く</button>
      <p class="hint">同じLAN内の利用者でも、このキーを知っている人だけがアクセスできます。</p>
    </form>
  </main>
  <script>
    const nextUrl = {{ next_url | tojson }};
    document.getElementById('unlock-form').addEventListener('submit', async (event) => {
      event.preventDefault();
      const errorEl = document.getElementById('unlock-error');
      errorEl.style.display = 'none';
      try {
        const res = await fetch('/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            shareKey: document.getElementById('share-key').value,
            next: nextUrl
          })
        });
        const data = await res.json();
        if (!res.ok || !data.ok) throw new Error(data.error || '認証できませんでした');
        location.href = data.next || '/';
      } catch (error) {
        errorEl.textContent = error.message || '共有キーが違います';
        errorEl.style.display = 'block';
      }
    });
  </script>
</body>
</html>
